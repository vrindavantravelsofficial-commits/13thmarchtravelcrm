version: '3.8'
services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - frontend/.env.production
    environment:
      - NODE_ENV=production
      - PLAYWRIGHT_BROWSERS_PATH=/root/.cache/ms-playwright
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  nginx:
    image: nginx:stable-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./deploy/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - frontend
    restart: unless-stopped

# Notes:
# - Populate `frontend/.env.production` on the VPS (do NOT commit secrets).
# - Provide nginx config in `deploy/nginx/conf.d` to proxy requests to frontend:3000.
# - Use `docker-compose -f docker-compose.hosting.yml up -d --build` on the VPS.